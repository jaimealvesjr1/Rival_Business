{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-8 text-center">
        <div class="glass-card p-5">
            <h1 class="display-4 font-weight-bold mb-3" style="color: #0984e3;">Rival Business</h1>
            <p class="lead">Desenvolva seu império, controle o mercado e domine o mundo.</p>
            <hr class="my-4" style="border-top: 1px solid rgba(0,0,0,0.1);">
            <p class="mb-4">Faça login ou registre-se para começar sua jornada para o topo.</p>
            
            <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
                <a class="btn btn-primary btn-modern btn-lg px-4 gap-3" href="{{ url_for('auth.register') }}" role="button">
                    <i class="fas fa-user-plus mr-2"></i> Criar Conta
                </a>
                <a class="btn btn-outline-dark btn-modern btn-lg px-4" href="{{ url_for('auth.login') }}" role="button">
                    <i class="fas fa-sign-in-alt mr-2"></i> Entrar no Jogo
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
